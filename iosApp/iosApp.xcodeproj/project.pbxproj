			shellScript = "# Copy Compose Multiplatform resources to the app bundle\n\nPROJECT_DIR=\"${SRCROOT}\"\n\n# Determine the correct architecture folder\nif [ \"${PLATFORM_NAME}\" = \"iphonesimulator\" ]; then\n    ARCH_FOLDER=\"iosSimulatorArm64\"\nelse\n    ARCH_FOLDER=\"iosArm64\"\nfi\n\n# Create the compose-resources/composeResources directory (must preserve the composeResources folder)\nCOMPOSE_RESOURCES_DIR=\"${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/compose-resources/composeResources\"\nmkdir -p \"${COMPOSE_RESOURCES_DIR}\"\n\n# Copy from assembled resources (core module)\nCORE_RESOURCES=\"${PROJECT_DIR}/../core/build/generated/compose/resourceGenerator/assembledResources/${ARCH_FOLDER}Main/composeResources\"\nif [ -d \"${CORE_RESOURCES}\" ]; then\n    cp -R \"${CORE_RESOURCES}/\"* \"${COMPOSE_RESOURCES_DIR}/\" 2>/dev/null || true\n    echo \"Copied core resources from: ${CORE_RESOURCES} to ${COMPOSE_RESOURCES_DIR}\"\nfi\n\n# Copy from aggregated resources (app module)\nAGG_RESOURCES=\"${PROJECT_DIR}/../app/build/kotlin-multiplatform-resources/aggregated-resources/${ARCH_FOLDER}/composeResources\"\nif [ -d \"${AGG_RESOURCES}\" ]; then\n    cp -R \"${AGG_RESOURCES}/\"* \"${COMPOSE_RESOURCES_DIR}/\" 2>/dev/null || true\n    echo \"Copied aggregated resources from: ${AGG_RESOURCES} to ${COMPOSE_RESOURCES_DIR}\"\nfi\n\necho \"Compose resources copied to: ${COMPOSE_RESOURCES_DIR}\"\n";
